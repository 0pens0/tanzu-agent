<h2 mat-dialog-title class="dialog-title">
  <mat-icon class="title-icon">security</mat-icon>
  How Credential Brokering Works
</h2>

<mat-dialog-content>
  <div class="diagram-viewport">
    <svg class="diagram-svg" viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg">
      <!-- Tanzu Platform boundary -->
      <rect class="platform-boundary" x="10" y="10" width="800" height="410" rx="12" />
      <text class="platform-label" x="410" y="38">Tanzu Platform (Cloud Foundry)</text>

      <!-- C2C network zone -->
      <rect class="c2c-boundary" x="30" y="55" width="510" height="180" rx="8" />
      <text class="c2c-label" x="285" y="77">C2C Network (cf add-network-policy)</text>

      <!-- Nodes -->
      <g class="node agent-node">
        <rect x="50" y="95" width="160" height="120" rx="8" />
        <text x="130" y="125" class="node-title">Goose Agent Chat</text>
        <text x="130" y="145" class="node-sub">CF Instance</text>
        <text x="130" y="161" class="node-sub">Identity Cert</text>
        <text x="130" y="185" class="node-sub cert-detail">OU=organization:...</text>
        <text x="130" y="197" class="node-sub cert-detail">OU=space:... OU=app:...</text>
      </g>

      <g class="node broker-node">
        <rect x="340" y="95" width="180" height="120" rx="8"
              [attr.stroke]="nodeStroke(2)" [attr.stroke-width]="nodeStrokeWidth(2)" />
        <text x="430" y="123" class="node-title">Credential Broker</text>
        <text x="430" y="143" class="node-sub">.apps.internal:8443</text>
        <text x="430" y="163" class="node-sub">mTLS Required</text>
        <text x="430" y="190" class="node-sub verify-label">Validates 3 layers:</text>
      </g>

      <!-- Three-layer check boxes -->
      <g class="node check-node">
        <rect x="560" y="90" width="230" height="34" rx="6"
              [attr.fill]="checkFill(5)" [attr.stroke]="checkStroke(5)" />
        <text x="675" y="112" class="check-text">1. Workload Identity (mTLS cert)</text>
      </g>
      <g class="node check-node">
        <rect x="560" y="133" width="230" height="34" rx="6"
              [attr.fill]="checkFill(5)" [attr.stroke]="checkStroke(5)" />
        <text x="675" y="155" class="check-text">2. Delegation Token (JWT)</text>
      </g>
      <g class="node check-node">
        <rect x="560" y="176" width="230" height="34" rx="6"
              [attr.fill]="checkFill(6)" [attr.stroke]="checkStroke(6)" />
        <text x="675" y="198" class="check-text">3. User Grant (active?)</text>
      </g>

      <!-- SSO Service -->
      <g class="node sso-node">
        <rect x="50" y="290" width="160" height="80" rx="8"
              [attr.stroke]="nodeStroke(1)" [attr.stroke-width]="nodeStrokeWidth(1)" />
        <text x="130" y="320" class="node-title">Tanzu SSO</text>
        <text x="130" y="338" class="node-title">Service</text>
        <text x="130" y="358" class="node-sub">User's access token</text>
      </g>

      <g class="node db-node">
        <rect x="340" y="310" width="160" height="60" rx="8"
              [attr.stroke]="nodeStroke(6)" [attr.stroke-width]="nodeStrokeWidth(6)" />
        <text x="420" y="338" class="node-title">PostgreSQL</text>
        <text x="420" y="355" class="node-sub">Grants + Delegations</text>
      </g>

      <g class="node target-node">
        <rect x="600" y="310" width="180" height="60" rx="8"
              [attr.stroke]="nodeStroke(7)" [attr.stroke-width]="nodeStrokeWidth(7)" />
        <text x="690" y="338" class="node-title">MCP Server</text>
        <text x="690" y="355" class="node-sub">GitHub, CF, etc.</text>
      </g>

      <!-- Step 1: Agent has user's SSO token -->
      <g class="step" [attr.opacity]="stepOpacity(1)">
        <line x1="130" y1="215" x2="130" y2="290" class="flow-line"
              [attr.stroke-dashoffset]="lineDashOffset(1)" />
        <circle cx="130" cy="255" r="10" class="step-number" />
        <text x="130" y="255" class="step-num-text">1</text>
        <text x="152" y="255" class="step-label label-right">User SSO Token</text>
      </g>

      <!-- Step 2: Token Exchange over mTLS -->
      <g class="step" [attr.opacity]="stepOpacity(2)">
        <line x1="210" y1="135" x2="340" y2="135" class="flow-line mtls-line"
              [attr.stroke-dashoffset]="lineDashOffset(2)" />
        <circle cx="275" cy="135" r="10" class="step-number" />
        <text x="275" y="135" class="step-num-text">2</text>
        <text x="275" y="115" class="step-label">Token Exchange (mTLS)</text>
      </g>

      <!-- Step 3: Broker issues delegation token -->
      <g class="step" [attr.opacity]="stepOpacity(3)">
        <path d="M 340,160 L 210,160" class="flow-line flow-return" fill="none"
              [attr.stroke-dashoffset]="lineDashOffset(3)" />
        <circle cx="275" cy="160" r="10" class="step-number" />
        <text x="275" y="160" class="step-num-text">3</text>
        <text x="275" y="182" class="step-label">Delegation JWT Returned</text>
      </g>

      <!-- Step 4: Credential request over mTLS -->
      <g class="step" [attr.opacity]="stepOpacity(4)">
        <line x1="210" y1="195" x2="340" y2="195" class="flow-line mtls-line"
              [attr.stroke-dashoffset]="lineDashOffset(4)" />
        <circle cx="275" cy="195" r="10" class="step-number" />
        <text x="275" y="195" class="step-num-text">4</text>
        <text x="275" y="217" class="step-label">Credential Request</text>
      </g>

      <!-- Step 5: Broker checks (arrows to check boxes) -->
      <g class="step" [attr.opacity]="stepOpacity(5)">
        <line x1="520" y1="107" x2="560" y2="107" class="flow-line"
              [attr.stroke-dashoffset]="lineDashOffset(5)" />
        <line x1="520" y1="150" x2="560" y2="150" class="flow-line"
              [attr.stroke-dashoffset]="lineDashOffset(5)" />
        <line x1="520" y1="193" x2="560" y2="193" class="flow-line"
              [attr.stroke-dashoffset]="lineDashOffset(5)" />
        <circle cx="540" cy="150" r="10" class="step-number" />
        <text x="540" y="150" class="step-num-text">5</text>
      </g>

      <!-- Step 6: Broker queries DB -->
      <g class="step" [attr.opacity]="stepOpacity(6)">
        <line x1="420" y1="215" x2="420" y2="310" class="flow-line"
              [attr.stroke-dashoffset]="lineDashOffset(6)" />
        <circle cx="420" cy="265" r="10" class="step-number" />
        <text x="420" y="265" class="step-num-text">6</text>
        <text x="442" y="265" class="step-label label-right">Verify Grant</text>
      </g>

      <!-- Step 7: Broker fetches from target -->
      <g class="step" [attr.opacity]="stepOpacity(7)">
        <line x1="500" y1="340" x2="600" y2="340" class="flow-line"
              [attr.stroke-dashoffset]="lineDashOffset(7)" />
        <circle cx="550" cy="340" r="10" class="step-number" />
        <text x="550" y="340" class="step-num-text">7</text>
      </g>
    </svg>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="replay()">
    <mat-icon>replay</mat-icon>
    Replay
  </button>
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
