# Memory profile: activated when goose-memory-db (PostgreSQL) is bound.
# java-cfenv-boot auto-configures spring.datasource.* from the CF service binding.
# The fallback values below are for local development only.

# Un-exclude JPA/DataSource auto-config (overrides base application.properties)
spring.autoconfigure.exclude=

spring.datasource.url=${MEMORY_DB_URL:jdbc:postgresql://localhost:5432/goose_memory}
spring.datasource.username=${MEMORY_DB_USER:postgres}
spring.datasource.password=${MEMORY_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
