spring.application.name=goose-agent-chat

# Goose Configuration
goose.enabled=true

# Async configuration for SSE streaming
spring.mvc.async.request-timeout=600000

# Disable response buffering for streaming
server.tomcat.max-swallow-size=-1

# Agent Credential Broker integration (set via env var or cf set-env)
# When set, the broker is used for credential acquisition instead of direct OAuth
broker.base-url=${BROKER_BASE_URL:}
