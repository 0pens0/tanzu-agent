spring.application.name=goose-agent-chat

# Goose Configuration
goose.enabled=true

# Async configuration for SSE streaming
spring.mvc.async.request-timeout=600000

# Disable response buffering for streaming
server.tomcat.max-swallow-size=-1

# Agent Credential Broker integration (set via env var or cf set-env)
# When set, the broker is used for credential acquisition instead of direct OAuth
broker.base-url=${BROKER_BASE_URL:}
broker.public-url=${BROKER_PUBLIC_URL:}

# Memory layer is activated via the "memory" Spring profile.
# Set SPRING_PROFILES_ACTIVE=memory in manifest.yml when goose-memory-db is bound.
# Without the profile, JPA/DataSource auto-configuration is excluded entirely so the
# app starts cleanly with no database.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
